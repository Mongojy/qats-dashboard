name = 'dashboard-quant'
main = "src/index.ts"
compatibility_date = "2026-07-04"
workers_dev = false

[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "qats-dashboard-data"

[assets]
directory = "./public"
not_found_handling = "404-page"
run_worker_first = ["/api/*"]

# Required environment variables — set via `wrangler secret put <NAME>`,
# never committed here:
#   ACCESS_TEAM_DOMAIN       team subdomain only, e.g. "myteam"
#   ACCESS_AUD               the Access application's AUD tag
#   ACCESS_ALLOWED_EMAIL     the single operator email allowed through
#   ACCESS_JWKS_TTL_SECONDS  optional, JWKS cache TTL in seconds (default 3600)

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
